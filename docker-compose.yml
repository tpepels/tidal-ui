version: '3'

services:
  svelte-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '443:5000'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TITLE=${TITLE}
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS}
      - REDIS_CACHE_TTL_SECONDS=${REDIS_CACHE_TTL_SECONDS}
      - REDIS_CACHE_TTL_SEARCH_SECONDS=${REDIS_CACHE_TTL_SEARCH_SECONDS}
      - REDIS_CACHE_TTL_TRACK_SECONDS=${REDIS_CACHE_TTL_TRACK_SECONDS}
      - REDIS_CACHE_MAX_BODY_BYTES=${REDIS_CACHE_MAX_BODY_BYTES}
      - DOWNLOAD_DIR=${DOWNLOAD_DIR}
      - WORKER_MAX_CONCURRENT=${WORKER_MAX_CONCURRENT:-4}
      - ALBUM_TRACK_CONCURRENCY=${ALBUM_TRACK_CONCURRENCY:-2}
      - ALBUM_TRACK_MAX_ATTEMPTS=${ALBUM_TRACK_MAX_ATTEMPTS:-12}
      - ALBUM_RETRY_BASE_DELAY_MS=${ALBUM_RETRY_BASE_DELAY_MS:-5000}
      - ALBUM_RETRY_MAX_DELAY_MS=${ALBUM_RETRY_MAX_DELAY_MS:-300000}
      - FFPROBE_PATH=${FFPROBE_PATH}
      - FFPROBE_DURATION_TOLERANCE_SECONDS=${FFPROBE_DURATION_TOLERANCE_SECONDS}
      - PORT=5000

networks:
  default:
    driver: bridge
